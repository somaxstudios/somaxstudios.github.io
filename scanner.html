<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Leitor de Fitas - Somax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { labelAccent: '#6366f1', labelCard: '#18181b' } } }
        }
    </script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4 flex flex-col items-center">

<div class="w-full max-w-md">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Leitor de Catálogo</h1>
        <a href="index.html" class="text-zinc-400 hover:text-white">Voltar</a>
    </div>

    <!-- Botão para iniciar câmara manualmente -->
    <button id="btnIniciar" onclick="iniciarLeitor()" class="w-full mb-4 bg-labelAccent hover:bg-indigo-600 text-white font-medium py-3 px-4 rounded-xl transition-colors shadow-lg">
        📸 Iniciar Câmara para Escanear
    </button>

    <!-- Área da câmara (inicialmente oculta) -->
    <div id="reader" style="display: none;" class="bg-labelCard border border-zinc-800 rounded-xl p-4 shadow-xl mb-6"></div>

    <!-- Mensagem de erro/permissão -->
    <div id="erroCamara" class="hidden bg-red-900/50 border border-red-700 rounded-xl p-3 text-sm text-red-200 mb-4"></div>

    <!-- Card de resultado -->
    <div id="resultado" class="hidden bg-labelCard border border-zinc-800 rounded-xl p-6 shadow-xl">
        <div class="flex justify-between items-start border-b border-zinc-800 pb-4 mb-4">
            <div>
                <span class="text-xs font-mono text-labelAccent bg-labelAccent/10 px-2 py-1 rounded" id="res-id">ID: 000</span>
                <h2 class="text-xl font-bold mt-2" id="res-titulo">Carregando...</h2>
                <p class="text-zinc-400" id="res-artista">...</p>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between">
                <span class="text-zinc-500 text-sm">Prateleira</span>
                <span class="font-medium" id="res-prateleira">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-zinc-500 text-sm">Gravadora</span>
                <span class="font-medium" id="res-gravadora">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-zinc-500 text-sm">Status</span>
                <span class="font-medium" id="res-status">-</span>
            </div>
        </div>

        <button onclick="reiniciarLeitor()" class="w-full mt-6 bg-labelAccent hover:bg-indigo-600 text-white font-medium py-2 px-4 rounded transition-colors">
            Escanear Outra Fita
        </button>
    </div>
</div>

<script>
    // Supabase
    const supabaseUrl = 'https://ulbqzvztwrqmaxbzsmmv.supabase.co';
    const supabaseKey = 'sb_publishable_shOmcA8udv3Tw0xKYzafAw_s1YXgbDk';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let html5QrCode;
    let scanning = false;

    const readerDiv = document.getElementById('reader');
    const btnIniciar = document.getElementById('btnIniciar');
    const resultadoDiv = document.getElementById('resultado');
    const erroDiv = document.getElementById('erroCamara');

    function mostrarErro(msg) {
        erroDiv.innerText = msg;
        erroDiv.classList.remove('hidden');
        setTimeout(() => erroDiv.classList.add('hidden'), 5000);
    }

    async function iniciarLeitor() {
        // Evita múltiplas inicializações
        if (scanning) return;

        // Limpa e esconde resultado anterior
        resultadoDiv.classList.add('hidden');
        erroDiv.classList.add('hidden');
        btnIniciar.style.display = 'none';
        readerDiv.style.display = 'block';

        // Cria instância do Html5Qrcode (API de mais baixo nível)
        html5QrCode = new Html5Qrcode("reader");

        try {
            scanning = true;
            // Pede acesso à câmara traseira (preferencial) e começa a ler
            await html5QrCode.start(
                { facingMode: "environment" },  // câmara traseira em telemóveis
                {
                    fps: 10,
                    qrbox: { width: 250, height: 100 },
                    formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ]
                },
                onScanSuccess,
                onScanFailure
            );
        } catch (err) {
            console.error("Erro ao aceder à câmara:", err);
            let mensagem = "Não foi possível aceder à câmara.\n";
            if (err.name === "NotAllowedError") {
                mensagem += "Permissão negada. Verifique as definições do navegador.";
            } else if (err.name === "NotFoundError") {
                mensagem += "Nenhuma câmara encontrada no dispositivo.";
            } else if (err.name === "NotReadableError") {
                mensagem += "A câmara está a ser usada por outra aplicação.";
            } else {
                mensagem += "Erro técnico: " + err.message;
            }
            mostrarErro(mensagem);
            reiniciarLeitor();  // repõe o botão
        }
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (!scanning) return;  // segurança

        // Para a câmara assim que lê um código
        if (html5QrCode) {
            html5QrCode.stop();
            scanning = false;
        }
        readerDiv.style.display = 'none';
        resultadoDiv.classList.remove('hidden');

        const idProduto = parseInt(decodedText, 10);

        supabase
            .from('catalogo')
            .select('*')
            .eq('id', idProduto)
            .single()
            .then(({ data, error }) => {
                if (error || !data) {
                    document.getElementById('res-titulo').innerText = "Produto não encontrado";
                    document.getElementById('res-artista').innerText = "Código inválido ou não registado.";
                    document.getElementById('res-id').innerText = `CÓDIGO: ${decodedText}`;
                    return;
                }
                document.getElementById('res-id').innerText = `CÓDIGO: ${decodedText}`;
                document.getElementById('res-titulo').innerText = data.titulo || 'Sem Título';
                document.getElementById('res-artista').innerText = data.artista || 'Artista Desconhecido';
                document.getElementById('res-prateleira').innerText = data.prateleira || 'Não definida';
                document.getElementById('res-gravadora').innerText = data.gravadora || '-';
                document.getElementById('res-status').innerText = data.stream_status || 'Pendente';
            });
    }

    function onScanFailure(error) {
        // ignoramos falhas normais (cada frame sem código)
    }

    function reiniciarLeitor() {
        // Para e limpa o scanner se estiver activo
        if (html5QrCode && scanning) {
            html5QrCode.stop().catch(e => console.warn("Erro ao parar scanner", e));
            scanning = false;
        }
        readerDiv.style.display = 'none';
        resultadoDiv.classList.add('hidden');
        btnIniciar.style.display = 'block';
        erroDiv.classList.add('hidden');
    }
</script>
</body>
</html>
