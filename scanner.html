<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Leitor de Fitas - Somax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { labelAccent: '#6366f1', labelCard: '#18181b' } } }
        }
    </script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-4 flex flex-col items-center">

<div class="w-full max-w-md">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Leitor de Catálogo</h1>
        <a href="index.html" class="text-zinc-400 hover:text-white">Voltar</a>
    </div>

    <button id="btnIniciar" class="w-full mb-4 bg-labelAccent hover:bg-indigo-600 text-white font-medium py-3 px-4 rounded-xl transition-colors shadow-lg">
        📸 Iniciar Câmara para Escanear
    </button>

    <div id="reader" style="display: none;" class="bg-labelCard border border-zinc-800 rounded-xl p-4 shadow-xl mb-6"></div>

    <div id="erroCamara" class="hidden bg-red-900/50 border border-red-700 rounded-xl p-3 text-sm text-red-200 mb-4"></div>

    <div id="resultado" class="hidden bg-labelCard border border-zinc-800 rounded-xl p-6 shadow-xl">
        <div class="flex justify-between items-start border-b border-zinc-800 pb-4 mb-4">
            <div>
                <span class="text-xs font-mono text-labelAccent bg-labelAccent/10 px-2 py-1 rounded" id="res-id">ID: 000</span>
                <h2 class="text-xl font-bold mt-2" id="res-titulo">Carregando...</h2>
                <p class="text-zinc-400" id="res-artista">...</p>
            </div>
        </div>
        <div class="space-y-3">
            <div class="flex justify-between">
                <span class="text-zinc-500 text-sm">Prateleira</span>
                <span class="font-medium" id="res-prateleira">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-zinc-500 text-sm">Gravadora</span>
                <span class="font-medium" id="res-gravadora">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-zinc-500 text-sm">Status</span>
                <span class="font-medium" id="res-status">-</span>
            </div>
        </div>
        <button id="btnReiniciar" class="w-full mt-6 bg-labelAccent hover:bg-indigo-600 text-white font-medium py-2 px-4 rounded transition-colors">
            Escanear Outra Fita
        </button>
    </div>
</div>

<script>
    (function() {
        // Supabase – sem conflito de declaração
        const SUPABASE_URL = 'https://ulbqzvztwrqmaxbzsmmv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_shOmcA8udv3Tw0xKYzafAw_s1YXgbDk';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let html5QrCode = null;
        let scanning = false;

        const readerDiv = document.getElementById('reader');
        const btnIniciar = document.getElementById('btnIniciar');
        const resultadoDiv = document.getElementById('resultado');
        const erroDiv = document.getElementById('erroCamara');
        const btnReiniciar = document.getElementById('btnReiniciar');

        function mostrarErro(msg) {
            erroDiv.innerText = msg;
            erroDiv.classList.remove('hidden');
            setTimeout(() => erroDiv.classList.add('hidden'), 5000);
        }

        async function iniciarLeitor() {
            if (scanning) return;
            resultadoDiv.classList.add('hidden');
            erroDiv.classList.add('hidden');
            btnIniciar.style.display = 'none';
            readerDiv.style.display = 'block';

            html5QrCode = new Html5Qrcode("reader");
            try {
                scanning = true;
                await html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 100 },
                        formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ]
                    },
                    onScanSuccess,
                    onScanFailure
                );
            } catch (err) {
                console.error(err);
                let mensagem = "Erro ao aceder à câmara.\n";
                if (err.name === "NotAllowedError") mensagem += "Permissão negada. Verifique as definições do navegador.";
                else if (err.name === "NotFoundError") mensagem += "Nenhuma câmara encontrada.";
                else if (err.name === "NotReadableError") mensagem += "Câmara a ser usada por outra app.";
                else mensagem += "Detalhe: " + err.message;
                mostrarErro(mensagem);
                reiniciarLeitor();
            }
        }

        function onScanSuccess(decodedText) {
            if (!scanning) return;
            if (html5QrCode) {
                html5QrCode.stop();
                scanning = false;
            }
            readerDiv.style.display = 'none';
            resultadoDiv.classList.remove('hidden');

            const idProduto = parseInt(decodedText, 10);
            supabase
                .from('catalogo')
                .select('*')
                .eq('id', idProduto)
                .single()
                .then(({ data, error }) => {
                    if (error || !data) {
                        document.getElementById('res-titulo').innerHTML = "Produto não encontrado";
                        document.getElementById('res-artista').innerHTML = "Código inválido ou não registado.";
                        document.getElementById('res-id').innerHTML = `CÓDIGO: ${decodedText}`;
                        return;
                    }
                    document.getElementById('res-id').innerHTML = `CÓDIGO: ${decodedText}`;
                    document.getElementById('res-titulo').innerHTML = data.titulo || 'Sem Título';
                    document.getElementById('res-artista').innerHTML = data.artista || 'Artista Desconhecido';
                    document.getElementById('res-prateleira').innerHTML = data.prateleira || 'Não definida';
                    document.getElementById('res-gravadora').innerHTML = data.gravadora || '-';
                    document.getElementById('res-status').innerHTML = data.stream_status || 'Pendente';
                });
        }

        function onScanFailure(/*error*/) {
            // ignorado
        }

        function reiniciarLeitor() {
            if (html5QrCode && scanning) {
                html5QrCode.stop().catch(e => console.warn(e));
                scanning = false;
            }
            readerDiv.style.display = 'none';
            resultadoDiv.classList.add('hidden');
            btnIniciar.style.display = 'block';
            erroDiv.classList.add('hidden');
        }

        // Associar eventos (sem onclick inline)
        btnIniciar.addEventListener('click', iniciarLeitor);
        btnReiniciar.addEventListener('click', reiniciarLeitor);

        // Expor globalmente caso precise (mas não é obrigatório)
        window.iniciarLeitor = iniciarLeitor;
        window.reiniciarLeitor = reiniciarLeitor;
    })();
</script>
</body>
</html>
