<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Projeto - Polymusic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen text-gray-800">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between mb-2">
                <h1 class="text-3xl font-bold">Editar Projeto</h1>
                <a href="gerenciar-projetos.html" class="text-blue-600 hover:text-blue-800">← Voltar</a>
            </div>
            <p class="text-gray-500 mb-6">Altere os dados do projeto e das faixas.</p>

            <form id="form-lancamento" class="space-y-8">
                <!-- ========== SEÇÃO 1: INFORMAÇÕES GERAIS ========== -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm">1</span>
                        Informações Gerais
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Nome do Projeto (ocupa todas as colunas) -->
                        <div class="col-span-1 md:col-span-2 lg:col-span-3">
                            <label class="block text-sm font-semibold mb-1">Nome do Projeto (Título Principal) <span class="text-red-500">*</span></label>
                            <input type="text" id="nome_projeto" required 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <!-- Artista principal -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Artista principal</label>
                            <input type="text" id="titulo_principal" placeholder="Nome do artista principal"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Participação do projeto (feat. geral) -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Participação do projeto</label>
                            <input type="text" id="feat_projeto" placeholder="Ex: feat. Maria"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Formato -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Formato <span class="text-red-500">*</span></label>
                            <select id="formato" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="SINGLE">Single</option>
                                <option value="EP">EP</option>
                                <option value="ÁLBUM">Álbum</option>
                            </select>
                        </div>

                        <!-- Data de Lançamento -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Data de Lançamento</label>
                            <input type="date" id="data_lancamento" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Gênero -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Gênero</label>
                            <input type="text" id="genero" placeholder="ex: Gospel" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Subgênero -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Subgênero</label>
                            <input type="text" id="subgenero" placeholder="ex: R&B" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Label -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Label</label>
                            <input type="text" id="label" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Status do Projeto -->
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold mb-1">Status do Projeto</label>
                            <select id="status_geral" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="AINDA_NAO_TEM">Ainda não tem</option>
                                <option value="EM_ANDAMENTO">Em andamento</option>
                                <option value="CONCLUIDO">Concluído</option>
                            </select>
                        </div>

                        <!-- Datas condicionais do status (início) -->
                        <div id="status-geral-data-inicio" class="col-span-1 hidden">
                            <label class="block text-sm font-semibold mb-1">Iniciado em</label>
                            <input type="date" id="status_geral_data_inicio"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- Datas condicionais do status (conclusão) -->
                        <div id="status-geral-data-conclusao" class="col-span-1 hidden">
                            <label class="block text-sm font-semibold mb-1">Concluído em</label>
                            <input type="date" id="status_geral_data_conclusao"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>

                        <!-- NOVO: Distribuidora (aparece apenas quando status = CONCLUIDO) -->
                        <div id="status-geral-distribuidora" class="col-span-1 hidden">
                            <label class="block text-sm font-semibold mb-1">Distribuidora</label>
                            <select id="distribuidora" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                <option value="">Selecione</option>
                                <option value="The Orchard">The Orchard</option>
                                <option value="Believe">Believe</option>
                                <option value="Outra">Outra</option>
                            </select>
                            <!-- Campo texto para "Outra" (opcional) -->
                            <input type="text" id="distribuidora_outra" placeholder="Qual?"
                                   class="w-full px-4 py-2 mt-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 hidden">
                        </div>

                        <!-- Prioridade -->
                        <div class="col-span-1 flex items-center">
                            <label class="flex items-center gap-2 text-sm font-semibold">
                                <input type="checkbox" id="is_prioridade" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                <span>Marcar como prioridade</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- ========== SEÇÃO 2: FAIXAS ========== -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm">2</span>
                        Faixas
                    </h2>
                    
                    <div id="config-faixas" class="mb-6 hidden">
                        <label class="block text-sm font-semibold mb-2">Número de faixas</label>
                        <input type="number" id="num-faixas" min="1" value="2" 
                               class="w-32 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <button type="button" id="gerar-faixas" class="ml-4 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                            Gerar faixas
                        </button>
                    </div>

                    <div id="faixas-container" class="space-y-6">
                        <!-- As faixas serão inseridas dinamicamente via JavaScript -->
                    </div>
                </div>

                <!-- TEMPLATE PARA FAIXA (oculto) -->
                <template id="faixa-template">
                    <div class="faixa-item border border-gray-200 rounded-lg p-4 bg-gray-50" data-index="">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-semibold text-lg">Faixa</h3>
                            <button type="button" class="remover-faixa text-red-500 hover:text-red-700 text-sm hidden">Remover</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Título da faixa</label>
                                <input type="text" name="faixa_titulo[]" required class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">ISRC</label>
                                <input type="text" name="faixa_isrc[]" placeholder="BR..." class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Hook TikTok (MM:SS)</label>
                                <input type="text" name="faixa_hook[]" placeholder="01:15" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Participações (feat.)</label>
                                <input type="text" name="faixa_feat[]" placeholder="Artista convidado" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium mb-1">Letra (opcional)</label>
                                <textarea name="faixa_letra[]" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg"></textarea>
                            </div>
                        </div>

                        <!-- Compositores -->
                        <div class="mt-4">
                            <label class="block text-sm font-semibold mb-2">Compositores</label>
                            <div class="compositores-container space-y-2"></div>
                            <button type="button" class="adicionar-compositor mt-2 text-sm text-blue-600 hover:text-blue-800">+ Adicionar compositor</button>
                        </div>

                        <!-- Intérpretes -->
                        <div class="mt-4">
                            <label class="block text-sm font-semibold mb-2">Intérpretes</label>
                            <div class="interpretes-container space-y-2"></div>
                            <button type="button" class="adicionar-interprete mt-2 text-sm text-blue-600 hover:text-blue-800">+ Adicionar intérprete</button>
                        </div>

                        <!-- Status do Áudio -->
                        <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Status do Áudio</label>
                                <select name="faixa_audio_status[]" class="audio-status-select w-full px-3 py-2 border border-gray-300 rounded-lg">
                                    <option value="AINDA_NAO_TEM">Ainda não tem</option>
                                    <option value="EM_ANDAMENTO">Em andamento</option>
                                    <option value="CONCLUIDO">Concluído</option>
                                </select>
                            </div>
                            <div class="audio-data-inicio hidden">
                                <label class="block text-sm font-medium mb-1">Iniciado em</label>
                                <input type="date" name="faixa_audio_inicio[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            </div>
                            <div class="audio-data-conclusao hidden">
                                <label class="block text-sm font-medium mb-1">Concluído em</label>
                                <input type="date" name="faixa_audio_conclusao[]" class="w-full px-3 py-2 border border-gray-300 rounded-lg">
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ========== SEÇÃO 3: PRODUÇÃO MUSICAL E MÚSICOS ========== -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-sm">3</span>
                        Produção Musical (geral)
                    </h2>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Produtores</label>
                        <div id="produtores-container" class="space-y-2"></div>
                        <button type="button" id="adicionar-produtor" class="mt-2 text-sm text-blue-600 hover:text-blue-800">+ Adicionar produtor</button>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-2">Músicos</label>
                        <div id="musicos-container" class="space-y-2"></div>
                        <button type="button" id="adicionar-musico" class="mt-2 text-sm text-blue-600 hover:text-blue-800">+ Adicionar músico</button>
                    </div>
                </div>

                <!-- ========== SEÇÃO 4: CAPA ========== -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-8 h-8 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-sm">4</span>
                        Arte da Capa
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">Status da Capa</label>
                            <select id="capa_status" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                <option value="AINDA_NAO_TEM">Ainda não tem</option>
                                <option value="EM_ANDAMENTO">Em andamento</option>
                                <option value="CONCLUIDO">Concluído</option>
                            </select>
                        </div>
                        <div id="capa-data-inicio" class="hidden">
                            <label class="block text-sm font-medium mb-1">Iniciado em</label>
                            <input type="date" id="capa_data_inicio" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div id="capa-data-conclusao" class="hidden">
                            <label class="block text-sm font-medium mb-1">Concluído em</label>
                            <input type="date" id="capa_data_conclusao" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                    </div>
                </div>

                <!-- ========== SEÇÃO 5: LINKS ========== -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span class="w-8 h-8 bg-gray-100 text-gray-600 rounded-full flex items-center justify-center text-sm">5</span>
                        Links
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">Spotify ID (URL ou URI)</label>
                            <input type="text" id="spotify_id" placeholder="ex: 6RUKPb4LETWmmr3iAEQktW" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Apple Music ID</label>
                            <input type="text" id="apple_music_id" placeholder="ex: 1445632471" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Backup URL</label>
                            <input type="url" id="backup_url" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Release (texto)</label>
                            <textarea id="release_texto" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Notas adicionais</label>
                            <textarea id="notas" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex justify-end gap-4">
                    <button type="button" onclick="window.location.href='gerenciar-projetos.html'" 
                            class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
                        Cancelar
                    </button>
                    <button type="submit" id="btn-salvar" 
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
                        Atualizar Projeto
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { carregarSidebar } from './js/sidebar.js';
        carregarSidebar();
    </script>

 <script type="module" src="./js/editar-projeto.js"></script>
 
</body>
</html>
