<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Códigos de Barras - Somax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script type="module" src="./js/auth-guard.js"></script>
    <script type="module" src="./js/app.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        
        .barcode-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 9mm;
            margin: 2mm 5mm;
            padding: 0 4px 0 0;
            background: white;
            color: black;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .barcode-card canvas {
            height: 9mm !important;
            width: auto !important;
            margin: 0 !important;
        }
        
        .barcode-card .label {
            font-size: 12px;
            font-family: monospace;
            font-weight: bold;
            white-space: nowrap;
            line-height: 1;
            margin-top: 0;
        }

        .group-card {
            background: #1f1f24;
            border-left: 4px solid #10b981;
        }

        .barcode-card.compacto-card {
            height: 10mm;
            max-width: 86mm;
            align-items: center;
        }

        .barcode-card.compacto-card .label {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 58mm;
            font-size: 9px;
            line-height: 1.2;
        }

        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area {
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                display: block !important;
            }
            @page { margin: 4mm; size: auto; }
            .barcode-card {
                display: inline-flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-start !important;
                width: auto !important;
                min-width: 65mm !important;
                max-width: none !important;
                height: 12mm !important;
                min-height: 12mm !important;
                margin: 2mm !important;
                padding: 1mm 3mm !important;
                background: white !important;
                border: 1px solid #000 !important;
                border-radius: 3px !important;
                overflow: visible !important;
                page-break-inside: avoid !important;
            }
            .barcode-card canvas, .barcode-card svg {
                height: 8mm !important;
                width: auto !important;
                min-width: 28mm !important;
                display: block !important;
                margin: 0 !important;
                flex-shrink: 0 !important;
            }
            .barcode-card .label {
                display: block !important;
                margin-left: 3mm !important;
                color: black !important;
                font-size: 7.5pt !important;
                font-family: monospace !important;
                font-weight: bold !important;
                white-space: nowrap !important;
                overflow: visible !important;
                max-width: none !important;
            }
            .barcode-card:not(.compacto-card) { min-width: 70mm !important; }
            .barcode-card.compacto-card {
                min-width: 110mm !important;
                height: 12mm !important;
                padding-right: 5mm !important;
            }
            .barcode-card.compacto-card canvas { min-width: 40mm !important; }
            .barcode-card.compacto-card .label { font-size: 7pt !important; white-space: nowrap !important; }
            .barcode-card.compacto-card .barcode-text,
            .barcode-card.compacto-card .codigo,
            .barcode-card.compacto-card small { display: none !important; }
            button, .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white p-4">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Gerar Códigos de Barras</h1>
            <a href="index.html" class="text-zinc-400 hover:text-white">Voltar</a>
        </div>

        <div id="avisoPrateleira" class="mb-4 bg-amber-900/50 border border-amber-700 text-amber-200 px-4 py-3 rounded-lg text-sm hidden">
            ⚠️ Por favor, selecione uma prateleira no filtro abaixo para visualizar os produtos e grupos.
        </div>

        <div class="mb-4 flex gap-4 no-print bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex-wrap">
            <div class="flex-1 min-w-[180px]">
                <label class="block text-xs text-zinc-400 mb-1">Buscar (Título ou Artista)</label>
                <input type="text" id="inputBusca" placeholder="Ex: Forró..." class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500" disabled>
            </div>
            <div class="w-1/3 relative min-w-[150px]">
                <label class="block text-xs text-zinc-400 mb-1">Filtrar Prateleira (obrigatório)</label>
                <select id="filterPrateleira" class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 appearance-none custom-scrollbar cursor-pointer">
                    <option value="" disabled selected>Selecione uma prateleira</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 pt-5 text-zinc-400">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <div class="mb-4 flex gap-2 no-print flex-wrap">
            <button id="btnImprimirTodos" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Imprimir Visíveis</button>
            <button id="btnSelecionarTodos" class="bg-zinc-700 hover:bg-zinc-600 px-4 py-2 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Seleccionar Todos</button>
            <button id="btnImprimirSelecionados" class="bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>Imprimir Seleccionados</button>
            <button id="btnAgruparCompacto" class="bg-amber-700 hover:bg-amber-600 px-4 py-2 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>📦 Agrupar selecionados como Compacto</button>
        </div>

        <!-- Lista de produtos -->
        <div id="listaProdutos" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="col-span-full text-zinc-500 py-4 text-center">Carregando catálogo...</div>
        </div>

        <!-- Área de grupos compactos -->
        <div class="no-print mt-8 border-t border-zinc-800 pt-6">
            <h2 class="text-xl font-semibold mb-3 flex items-center gap-2">📀 Grupos Compactos <span class="text-xs text-zinc-400">(produtos na mesma caixa/fita)</span></h2>
            <div id="listaGrupos" class="space-y-3">
                <div class="text-zinc-500 text-sm">Selecione uma prateleira para ver os grupos.</div>
            </div>
        </div>

        <div id="areaImpressao" class="print-area hidden"></div>
    </div>

    <script type="module">
    import { supabase } from './js/supabase-client.js';

    let produtos = [];
    let gruposCompactos = [];
    let prateleiraSelecionada = "";

    function limparTituloParaGrupo(titulo) {
        const antesBarra = (titulo || "Sem título").split('/')[0].trim();
        return antesBarra || "Sem título";
    }

    function descricaoCompactaGrupo(grupo) {
        const idsGrupo = (grupo.produtosIds || []).map(Number);
        const nomes = idsGrupo
            .map(id => produtos.find(p => Number(p.id) === id))
            .filter(Boolean)
            .map(p => limparTituloParaGrupo(p.titulo));
        return nomes.join(' / ');
    }

    function getIdsProdutosAgrupados() {
        return new Set(gruposCompactos.flatMap(g => g.produtosIds || []));
    }

    function getGruposVisiveis() {
        if (!prateleiraSelecionada) return [];
        const termoBusca = document.getElementById('inputBusca').value.toLowerCase();
        return gruposCompactos.filter(grupo => {
            const produtosDoGrupo = produtos.filter(p => grupo.produtosIds.includes(Number(p.id)));
            if (produtosDoGrupo.length === 0) return false;
            const matchBusca = termoBusca === '' || produtosDoGrupo.some(p => {
                const titulo = (p.titulo || '').toLowerCase();
                const artista = (p.artista || '').toLowerCase();
                const numero = (p.numero || '').toLowerCase();
                return titulo.includes(termoBusca) || artista.includes(termoBusca) || numero.includes(termoBusca);
            });
            const matchPrateleira = produtosDoGrupo.some(p => p.prateleira === prateleiraSelecionada);
            return matchBusca && matchPrateleira;
        });
    }

    // Carregar grupos do Supabase (apenas da prateleira selecionada)
    async function carregarGruposSupabase() {
        if (!prateleiraSelecionada) return;

        const { data, error } = await supabase
            .from('grupos_compactos')
            .select('*')
            .eq('prateleira', prateleiraSelecionada)
            .order('id', { ascending: false });

        if (error) {
            console.error('Erro detalhado:', error);
            if (error.code === 'PGRST301' || error.message.includes('permission')) {
                alert('Erro de permissão na tabela grupos_compactos. Execute as políticas RLS no Supabase.');
            } else {
                alert('Erro ao carregar grupos: ' + error.message);
            }
            gruposCompactos = [];
            return;
        }

        gruposCompactos = (data || []).map(g => ({
            id: g.id,
            codigo: g.codigo,
            produtosIds: (g.produtos_ids || []).map(Number),
            descricao: g.descricao,
            prateleira: g.prateleira
        }));

        renderizarLista();
        renderizarGrupos();
    }

    // Salvar novo grupo no Supabase
    async function salvarGrupoSupabase(produtosIds) {
        const idsNormalizados = produtosIds.map(id => Number(id)).filter(Boolean);
        const descricao = idsNormalizados
            .map(id => produtos.find(p => Number(p.id) === id))
            .filter(Boolean)
            .map(p => limparTituloParaGrupo(p.titulo))
            .join(' / ');

        const { data, error } = await supabase
            .from('grupos_compactos')
            .insert({
                codigo: 'TEMP',
                produtos_ids: idsNormalizados,
                descricao,
                prateleira: prateleiraSelecionada
            })
            .select()
            .single();

        if (error) {
            console.error(error);
            alert('Erro ao salvar grupo compacto.');
            return false;
        }

        const codigoFinal = `CMP-${String(data.id).padStart(8, '0')}`;
        const { error: updateError } = await supabase
            .from('grupos_compactos')
            .update({ codigo: codigoFinal })
            .eq('id', data.id);

        if (updateError) {
            console.error(updateError);
            alert('Grupo criado, mas erro ao gerar código final.');
            return false;
        }

        await carregarGruposSupabase();
        alert('Grupo compacto criado com sucesso.');
        return true;
        
    }

    // Remover grupo do Supabase
    async function removerGrupoSupabase(grupoId) {
        const { error } = await supabase
            .from('grupos_compactos')
            .delete()
            .eq('id', grupoId);
        if (error) {
            console.error(error);
            alert('Erro ao excluir grupo.');
            return false;
        }
        await carregarGruposSupabase();
        return true;
    }

    // Alterar grupo (editar lista de produtos)
    async function alterarGrupoSupabase(grupoId, novosIds) {
        const idsNormalizados = novosIds.map(id => Number(id)).filter(Boolean);
        const descricao = idsNormalizados
            .map(id => produtos.find(p => Number(p.id) === id))
            .filter(Boolean)
            .map(p => limparTituloParaGrupo(p.titulo))
            .join(' / ');

        const { error } = await supabase
            .from('grupos_compactos')
            .update({
                produtos_ids: idsNormalizados,
                descricao
            })
            .eq('id', grupoId);

        if (error) {
            console.error(error);
            alert('Erro ao alterar grupo.');
            return false;
        }
        await carregarGruposSupabase();
        return true;
    }

    async function carregarProdutos() {
        let todosOsDados = [];
        const limite = 1000;
        let offset = 0;
        let temMais = true;

        try {
            while (temMais) {
                const { data, error } = await supabase
                    .from('catalogo')
                    .select(`id, titulo, artista, prateleira, numero`)
                    .order('id')
                    .range(offset, offset + limite - 1);

                if (error) throw error;
                todosOsDados = todosOsDados.concat(data || []);
                if (!data || data.length < limite) temMais = false;
                else offset += limite;
            }
            produtos = todosOsDados;
            popularSelectPrateleiras();
            mostrarMensagemInicial();
        } catch (err) {
            console.error(err);
            alert('Erro inesperado ao carregar catálogo.');
        }
    }

    function popularSelectPrateleiras() {
        const select = document.getElementById('filterPrateleira');
        if (!select) return;
        select.innerHTML = '<option value="" disabled selected>Selecione uma prateleira</option>';
        const prateleirasUnicas = [...new Set(produtos.map(p => p.prateleira).filter(p => p))];
        prateleirasUnicas.sort();
        prateleirasUnicas.forEach(prat => {
            const option = document.createElement('option');
            option.value = prat;
            option.textContent = `Prateleira ${prat}`;
            select.appendChild(option);
        });
    }

    function mostrarMensagemInicial() {
        const containerProdutos = document.getElementById('listaProdutos');
        const containerGrupos = document.getElementById('listaGrupos');
        if (containerProdutos) {
            containerProdutos.innerHTML = `<div class="col-span-full text-amber-400 py-10 text-center bg-zinc-900/50 rounded-lg border border-amber-800/30">
                👈 Selecione uma prateleira no filtro acima para começar.
            </div>`;
        }
        if (containerGrupos) {
            containerGrupos.innerHTML = `<div class="text-zinc-500 text-sm">Selecione uma prateleira para ver os grupos compactos.</div>`;
        }
        document.getElementById('btnImprimirTodos').disabled = true;
        document.getElementById('btnSelecionarTodos').disabled = true;
        document.getElementById('btnImprimirSelecionados').disabled = true;
        document.getElementById('btnAgruparCompacto').disabled = true;
        document.getElementById('inputBusca').disabled = true;
    }

    function habilitarInterface() {
        document.getElementById('btnImprimirTodos').disabled = false;
        document.getElementById('btnSelecionarTodos').disabled = false;
        document.getElementById('btnImprimirSelecionados').disabled = false;
        document.getElementById('btnAgruparCompacto').disabled = false;
        document.getElementById('inputBusca').disabled = false;
    }

    function renderizarLista() {
        if (!prateleiraSelecionada) {
            mostrarMensagemInicial();
            return;
        }

        const termoBusca = document.getElementById('inputBusca').value.toLowerCase();
        const idsAgrupados = getIdsProdutosAgrupados();

        const produtosFiltrados = produtos.filter(prod => {
            if (idsAgrupados.has(Number(prod.id))) return false;
            if (prod.prateleira !== prateleiraSelecionada) return false;
            const titulo = (prod.titulo || '').toLowerCase();
            const artista = (prod.artista || '').toLowerCase();
            const numero = (prod.numero || '').toLowerCase();
            const matchBusca = termoBusca === '' || titulo.includes(termoBusca) || artista.includes(termoBusca) || numero.includes(termoBusca);
            return matchBusca;
        });

        const container = document.getElementById('listaProdutos');
        if (!container) return;
        container.innerHTML = '';

        if (produtosFiltrados.length === 0) {
            container.innerHTML = `<div class="col-span-full text-zinc-500 py-10 text-center">Nenhum produto individual encontrado nesta prateleira. Os itens que já viraram compacto aparecem na seção de grupos.</div>`;
            return;
        }

        produtosFiltrados.forEach(prod => {
            const idFormatado = String(prod.id).padStart(8, '0');
            const card = document.createElement('div');
            card.className = `bg-zinc-900 p-3 rounded-xl border border-zinc-800 flex flex-col justify-between hover:border-indigo-500/40 transition-all`;
            const numTape = prod.numero ? `Nº ${prod.numero}` : 'S/N';
            card.innerHTML = `
                <div class="flex items-start gap-2 mb-2">
                    <input type="checkbox" class="sel-produto mt-1" data-id="${prod.id}">
                    <div class="min-w-0">
                        <div class="font-bold text-sm leading-tight mb-1 break-words">${prod.titulo || 'Sem título'}</div>
                        <div class="text-xs text-zinc-400 break-words">${prod.artista || 'Sem artista'}</div>
                        <div class="text-xs font-mono text-indigo-400 mt-1">Local: ${prod.prateleira || '—'} | Tape: ${numTape}</div>
                    </div>
                </div>
                <div id="preview-${prod.id}" class="mt-2 flex justify-center bg-white p-1 rounded"></div>
            `;
            container.appendChild(card);
            gerarCodigoUnico(prod.id, idFormatado);
        });
    }

    function gerarCodigoUnico(prodId, codigoTexto) {
        const previewDiv = document.getElementById(`preview-${prodId}`);
        if (!previewDiv) return;
        previewDiv.innerHTML = '';
        const canvas = document.createElement('canvas');
        previewDiv.appendChild(canvas);
        JsBarcode(canvas, codigoTexto, {
            format: "CODE128", width: 1, height: 25, displayValue: true, fontSize: 12, margin: 2
        });
        canvas.style.height = '30px';
        canvas.style.width = 'auto';
    }

    function gerarCodigoParaGrupo(grupoId, codigoTexto, elementoCanvas) {
        JsBarcode(elementoCanvas, codigoTexto, {
            format: "CODE128", width: 1.2, height: 30, displayValue: true, fontSize: 11, margin: 2
        });
    }

    function renderizarGrupos() {
        if (!prateleiraSelecionada) {
            const containerGrupos = document.getElementById('listaGrupos');
            if (containerGrupos) containerGrupos.innerHTML = `<div class="text-zinc-500 text-sm">Selecione uma prateleira para ver os grupos compactos.</div>`;
            return;
        }

        const container = document.getElementById('listaGrupos');
        if (!container) return;
        const gruposVisiveis = getGruposVisiveis();

        if (gruposVisiveis.length === 0) {
            container.innerHTML = '<div class="text-zinc-500 text-sm">Nenhum grupo compacto nesta prateleira. Selecione produtos e clique em "Agrupar como Compacto".</div>';
            return;
        }

        container.innerHTML = '';
        gruposVisiveis.forEach(grupo => {
            const produtosDoGrupo = produtos.filter(p => grupo.produtosIds.includes(Number(p.id)));
            const descricaoCompleta = descricaoCompactaGrupo(grupo);
            const grupoIdStr = grupo.codigo || `CMP-${String(grupo.id).padStart(8, '0')}`;
            
            const divGrupo = document.createElement('div');
            divGrupo.className = 'group-card bg-zinc-900/60 rounded-lg p-3 border border-zinc-700 flex flex-wrap items-center justify-between gap-3';
            divGrupo.innerHTML = `
                <div class="flex items-start gap-3 flex-1 min-w-[240px]">
                    <input type="checkbox" class="sel-grupo mt-1" data-grupo-id="${grupo.id}" checked>
                    <div class="min-w-0">
                        <div class="text-sm font-mono text-emerald-400">${grupoIdStr}</div>
                        <div class="text-xs text-zinc-300 mt-1 max-h-20 overflow-y-auto custom-scrollbar break-words">${descricaoCompleta}</div>
                        <div class="text-xs text-zinc-500 mt-1">${produtosDoGrupo.length} produto(s) agrupado(s) — não aparecem mais na lista individual</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div id="preview-grupo-${grupo.id}" class="bg-white p-1 rounded flex items-center justify-center" style="min-width: 120px;"></div>
                    <button class="btn-imprimir-grupo bg-indigo-800 hover:bg-indigo-700 text-xs px-3 py-1 rounded" data-grupo-id="${grupo.id}">🖨️ Imprimir código do grupo</button>
                    <button class="btn-editar-grupo bg-amber-800 hover:bg-amber-700 text-xs px-2 py-1 rounded" data-grupo-id="${grupo.id}">✏️ Alterar</button>
                    <button class="btn-remover-grupo bg-red-900/50 hover:bg-red-800 text-xs px-2 py-1 rounded" data-grupo-id="${grupo.id}">✖</button>
                </div>
            `;
            container.appendChild(divGrupo);

            const previewDiv = document.getElementById(`preview-grupo-${grupo.id}`);
            if (previewDiv) {
                previewDiv.innerHTML = '';
                const canvas = document.createElement('canvas');
                previewDiv.appendChild(canvas);
                gerarCodigoParaGrupo(grupo.id, grupoIdStr, canvas);
                canvas.style.height = '35px';
                canvas.style.width = 'auto';
            }
        });

        // Eventos
        document.querySelectorAll('.btn-imprimir-grupo').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const grupoId = parseInt(btn.dataset.grupoId);
                const grupo = gruposCompactos.find(g => Number(g.id) === grupoId);
                if (grupo) imprimirCodigoGrupo(grupo);
            });
        });
        document.querySelectorAll('.btn-editar-grupo').forEach(btn => {
            btn.addEventListener('click', async () => {
                const grupoId = parseInt(btn.dataset.grupoId);
                const grupo = gruposCompactos.find(g => Number(g.id) === grupoId);
                if (!grupo) return;
                const novosIds = prompt(
                    'Informe os IDs dos produtos separados por vírgula:',
                    grupo.produtosIds.join(', ')
                );
                if (!novosIds) return;
                const idsNormalizados = novosIds.split(',').map(id => Number(id.trim())).filter(Boolean);
                await alterarGrupoSupabase(grupoId, idsNormalizados);
            });
        });
        document.querySelectorAll('.btn-remover-grupo').forEach(btn => {
            btn.addEventListener('click', async () => {
                const grupoId = parseInt(btn.dataset.grupoId);
                if (!confirm('Excluir este grupo compacto? Os produtos voltarão para a lista individual.')) return;
                await removerGrupoSupabase(grupoId);
            });
        });
    }

    async function criarGrupoCompacto(produtosIdsSelecionados) {
        if (produtosIdsSelecionados.length < 2) {
            alert('Selecione pelo menos 2 produtos para formar um grupo compacto.');
            return false;
        }
        const todosIdsEmGrupos = getIdsProdutosAgrupados();
        const idsNormalizados = produtosIdsSelecionados.map(id => Number(id)).filter(Boolean);
        const conflito = idsNormalizados.some(id => todosIdsEmGrupos.has(id));
        if (conflito) {
            alert('Um ou mais produtos selecionados já pertencem a um grupo compacto. Remova-os do grupo atual antes de recriar.');
            return false;
        }
        const prateleirasDosProdutos = idsNormalizados.map(id => produtos.find(p => p.id === id)?.prateleira).filter(Boolean);
        if (prateleirasDosProdutos.length > 0 && !prateleirasDosProdutos.every(p => p === prateleiraSelecionada)) {
            alert('Todos os produtos do grupo devem pertencer à prateleira atualmente selecionada.');
            return false;
        }
        return await salvarGrupoSupabase(idsNormalizados);
    }

    function criarCardImpressaoCodigo({ codigo, labelTexto, isGrupo = false }) {
        const card = document.createElement('div');
        card.className = isGrupo ? 'barcode-card compacto-card' : 'barcode-card';
        const canvas = document.createElement('canvas');
        card.appendChild(canvas);
        const label = document.createElement('div');
        label.className = 'label';
        label.innerText = labelTexto;
        card.appendChild(label);
        JsBarcode(canvas, codigo, {
            format: "CODE128", width: isGrupo ? 1 : 1.2, height: isGrupo ? 28 : 30,
            displayValue: false, fontSize: isGrupo ? 10 : 12, margin: isGrupo ? 1 : 0
        });
        return card;
    }

    function imprimirCodigoGrupo(grupo) {
        gerarItensParaImpressao([], [Number(grupo.id)]);
    }

    function gerarItensParaImpressao(produtosIds = [], gruposIds = []) {
        const area = document.getElementById('areaImpressao');
        if (!area) return;
        area.innerHTML = '';
        area.classList.remove('hidden');

        const gruposSelecionados = gruposCompactos.filter(g => gruposIds.includes(Number(g.id)));
        gruposSelecionados.forEach(grupo => {
            const grupoIdStr = grupo.codigo || `CMP-${String(grupo.id).padStart(8, '0')}`;
            const descricaoCompleta = descricaoCompactaGrupo(grupo);
            const labelGrupo = `COMPACTO: ${descricaoCompleta}`;
            area.appendChild(criarCardImpressaoCodigo({ codigo: grupoIdStr, labelTexto: labelGrupo, isGrupo: true }));
        });

        const idsDentroDeGruposImpressos = new Set(gruposSelecionados.flatMap(g => g.produtosIds));
        const produtosParaImprimir = produtos.filter(p => produtosIds.includes(Number(p.id)) && !idsDentroDeGruposImpressos.has(Number(p.id)));
        produtosParaImprimir.forEach(prod => {
            const codigo = String(prod.id).padStart(8, '0');
            const numTape = prod.numero ? `Nº ${prod.numero}` : 'S/N';
            area.appendChild(criarCardImpressaoCodigo({ codigo, labelTexto: `${prod.titulo || 'Sem título'} - ${prod.artista || 'Sem artista'} | ${numTape}`, isGrupo: false }));
        });

        if (!area.children.length) {
            area.classList.add('hidden');
            alert('Nenhum item válido para imprimir.');
            return;
        }
        setTimeout(() => { window.print(); setTimeout(() => area.classList.add('hidden'), 500); }, 150);
    }

    // ---------- Eventos ----------
    function inicializarEventos() {
        const selectPrateleira = document.getElementById('filterPrateleira');
        selectPrateleira.addEventListener('change', async (e) => {
            const valor = e.target.value;
            if (valor && valor !== "") {
                prateleiraSelecionada = valor;
                habilitarInterface();
                document.getElementById('avisoPrateleira')?.classList.add('hidden');
                await carregarGruposSupabase();
                renderizarLista();
                renderizarGrupos();
            } else {
                prateleiraSelecionada = "";
                mostrarMensagemInicial();
                document.getElementById('avisoPrateleira')?.classList.remove('hidden');
            }
        });

        document.getElementById('inputBusca')?.addEventListener('input', () => {
            if (prateleiraSelecionada) {
                renderizarLista();
                renderizarGrupos();
            }
        });

        document.getElementById('btnImprimirTodos')?.addEventListener('click', () => {
            if (!prateleiraSelecionada) return;
            const produtosVisiveis = Array.from(document.querySelectorAll('.sel-produto')).map(cb => parseInt(cb.dataset.id));
            const gruposVisiveis = getGruposVisiveis().map(g => Number(g.id));
            if (produtosVisiveis.length === 0 && gruposVisiveis.length === 0) { alert('Nenhum item visível para imprimir.'); return; }
            gerarItensParaImpressao(produtosVisiveis, gruposVisiveis);
        });

        document.getElementById('btnSelecionarTodos')?.addEventListener('click', () => {
            document.querySelectorAll('.sel-produto, .sel-grupo').forEach(cb => cb.checked = true);
        });

        document.getElementById('btnImprimirSelecionados')?.addEventListener('click', () => {
            const produtosSelecionados = Array.from(document.querySelectorAll('.sel-produto:checked')).map(cb => parseInt(cb.dataset.id));
            const gruposSelecionados = Array.from(document.querySelectorAll('.sel-grupo:checked')).map(cb => parseInt(cb.dataset.grupoId));
            if (produtosSelecionados.length === 0 && gruposSelecionados.length === 0) { alert('Selecione pelo menos um produto ou grupo compacto.'); return; }
            gerarItensParaImpressao(produtosSelecionados, gruposSelecionados);
        });

        document.getElementById('btnAgruparCompacto')?.addEventListener('click', async () => {
            const selecionados = Array.from(document.querySelectorAll('.sel-produto:checked')).map(cb => parseInt(cb.dataset.id));
            if (selecionados.length < 2) { alert('Selecione pelo menos 2 produtos para formar um grupo compacto.'); return; }
            await criarGrupoCompacto(selecionados);
            document.querySelectorAll('.sel-produto:checked').forEach(cb => cb.checked = false);
        });
    }

    carregarProdutos();
    inicializarEventos();
    mostrarMensagemInicial();
    document.getElementById('avisoPrateleira')?.classList.remove('hidden');
    </script>
</body>
